<!DOCTYPE html>
<html>
<head>
    <meta charset="ISO-8859-1">
    <title>Role Selection Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('img/avatars/back7.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
        }

        .container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            backdrop-filter: blur(2px);
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 28px;
        }

        a.button {
            display: block;
            margin: 15px 0;
            padding: 12px 20px;
            background-color: #001f3f; /* Navy Blue */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: background-color 0.3s ease, transform 0.2s;
        }

        a.button:hover {
            background-color: #001233; /* Darker navy on hover */
            transform: scale(1.03);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome ChildCare: Missing Child Reporting System</h1>
        <h3>Role Selection Portal</h3>
        <a href="Page_No_1_Admin_Login.html" class="button">Admin</a>
        <a href="Page_No_7_Police_Login.html" class="button">Police</a>
        <a href="Page_No_13_Citizen_Login.html" class="button">Citizen</a>
    </div>
   
</body>
</html>
