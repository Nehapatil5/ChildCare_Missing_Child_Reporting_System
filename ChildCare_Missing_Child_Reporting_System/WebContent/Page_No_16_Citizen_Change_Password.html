<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <meta name="description" content="Responsive Admin & Dashboard Template">
  <meta name="author" content="AdminKit">
  <title>Citizen Change Password</title>

  <link rel="shortcut icon" href="img/icons/icon-48x48.png" />
  <link href="css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url('img/avatars/back7.png');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-weight: 600;
    }
  </style>
</head>

<body>

  <main class="content">
    <div class="container-fluid p-0">
      <div class="row">
        <div class="col-md-8 offset-md-2">
          <div class="card">
          
          <center><h1 class="h3 mb-3 mt-3">Change Password</h1></center>
            <form action="PAge_No_8_Citizen_Change_Password" method="post" id="changePasswordForm">
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">New Password</label>
                  <input type="password" name="newpassword" class="form-control" id="newpassword" placeholder="Enter new password" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" name="confirmpassword" class="form-control" id="confirmpassword" placeholder="Confirm password" required>
                </div>
              </div>

              <div class="card-footer text-end">
                <button type="submit" class="btn btn-success me-2">Change Password</button>
                <button type="reset" class="btn btn-warning">Reset</button>
              </div>

              <div class="text-center mb-3">
                <a href="Page_No_17_Citizen_Dashboard.html" class="btn btn-secondary">Back</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- JS -->
  <script src="js/app.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert/2.1.2/sweetalert.min.js"></script>
  <script>
    document.getElementById('changePasswordForm').addEventListener('submit', function (e) {
      const newPass = document.getElementById('newpassword').value;
      const confirmPass = document.getElementById('confirmpassword').value;

      if (newPass !== confirmPass) {
        e.preventDefault(); // Stop form from submitting
        swal({
          title: "Error!",
          text: "New Password and Confirm Password do not match.",
          icon: "error"
        });
      } else {
        // Optional: Display success alert after submission (if not redirected by servlet)
        // e.preventDefault(); // Uncomment this if servlet does not redirect immediately
        swal({
          title: "Success!",
          text: "Password changed successfully.",
          icon: "success",
          timer: 3000,
          buttons: false
        });
      }
    });
  </script>
</body>
</html>
