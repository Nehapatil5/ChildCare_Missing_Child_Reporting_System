<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    .btn-navy {
      background-color: #001f3f; /* Navy blue */
      color: white;
      border: none;
    }

    .btn-navy:hover {
      background-color: #001a35; /* Darker navy on hover */
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <!-- Sidebar -->
    <nav id="sidebar" class="sidebar js-sidebar">
      <div class="d-flex justify-content-start mb-3">
        <a href="Page_No_2_Admin_Dashboard.html" class="btn btn-secondary">Back</a>
      </div>
      <div class="sidebar-content js-simplebar">
        <a class="sidebar-brand" href="Page_No_2_Admin_Dashboard.html">
          <span class="align-middle">Admin Dashboard</span>
        </a>
        <ul class="sidebar-nav">
          <li class="sidebar-header">Admin</li>
          <li class="sidebar-item active">
            <a class="sidebar-link" href="Page_No_2_Add_Police_Officers.html">
              <i class="align-middle" data-feather="user-plus"></i>
              <span class="align-middle">Add Police Officer</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Page_No_3_View_Police_Officers.jsp">
              <i class="align-middle" data-feather="users"></i>
              <span class="align-middle">View Police Officers</span>
            </a>
          </li>
          <li class="sidebar-item">
            <a class="sidebar-link" href="Page_No_5_View_Citizens.jsp">
              <i class="align-middle" data-feather="user"></i>
              <span class="align-middle">View Citizens</span>
            </a>
          </li>
           <li class="sidebar-item">
            <a class="sidebar-link" href="Page_No_18_View reports.jsp">
              <i class="align-middle" data-feather="user-check"></i>
              <span class="align-middle">View Child Missing Reports</span>
            </a>
          </li>
          
        </ul>
      </div>
    </nav>

    <!-- Main Content -->
    <div class="main">
      <main class="content">
        <div class="container-fluid p-0">
          <div class="mb-3">
            <h1 class="h3 d-inline align-middle">Add Police Officer</h1>
          </div>

          <div class="row">
            <div class="col-md-8 col-lg-6">
              <div class="card">
                <div class="card-body">
                  <form action="Page_No_2_Add_Police_Officers" method="post">
                    <div class="mb-3">
                      <label class="form-label">Name of Police Officer</label>
                      <input type="text" name="name" class="form-control" placeholder="Enter the name of police officer" required>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Station</label>
                      <input type="text" name="station" class="form-control" placeholder="Enter the station name" required>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Contact</label>
                      <input type="text" name="contact" class="form-control" placeholder="Enter the contact number" required>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Email</label>
                      <input type="email" name="email" class="form-control" placeholder="Enter the email" required>
                    </div>

                    <div class="mb-3">
                      <label class="form-label">Password</label>
                      <input type="text" name="password" class="form-control" placeholder="Enter the password" required>
                    </div>

                    <button type="submit" class="btn btn-navy">Add Police Officer</button>
                  </form>
                </div>
              </div>
            </div>
          </div>

        </div>
      </main>

      <footer class="footer">
        <div class="container-fluid">
          <div class="row text-muted">
            <div class="col-6 text-start">

            <div class="col-6 text-end">
              <ul class="list-inline">

                  <a class="text-muted" href="#">Privacy</a>
                </li>
                <li class="list-inline-item">
                  <a class="text-muted" href="#">Terms</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </footer>
    </div>
  </div>

  <!-- AdminKit Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
