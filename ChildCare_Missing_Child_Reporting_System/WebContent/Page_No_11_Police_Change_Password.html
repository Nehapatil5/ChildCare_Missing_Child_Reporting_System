<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="ISO-8859-1">
  <title>Police Change Password</title>
  <link rel="shortcut icon" href="img/icons/icon-48x48.png" />
  <link href="css/app.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-image: url('img/avatars/back7.png');
      background-size: cover;
      background-position: center;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background-color: rgba(255, 255, 255, 0.95);
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-weight: 600;
    }

    .btn-secondary {
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <main class="content">
    <div class="container-fluid p-0">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <center><h1 class="h3 mb-3 mt-3">Change Password</h1></center>
            <form action="Page_No_4_Police_Change_Password" method="post" id="policeChangePasswordForm">
              <div class="card-body">
                <div class="mb-3">
                  <label class="form-label">Email</label>
                  <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">New Password</label>
                  <input type="password" name="newpassword" class="form-control" placeholder="Enter new password" required>
                </div>

                <div class="mb-3">
                  <label class="form-label">Confirm Password</label>
                  <input type="password" name="confirmpassword" class="form-control" placeholder="Confirm password" required>
                </div>
              </div>
              <div class="card-footer text-end">
                <button type="submit" class="btn btn-success me-2">Change Password</button>
                <button type="reset" class="btn btn-warning">Reset</button>
              </div>
              <div class="text-center">
                <a href="Page_No_7_Police_Login.html" class="btn btn-secondary">Back</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
